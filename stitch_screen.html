<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Panda Journal - Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "orange": {
                50: '#fff7ed',
                100: '#ffedd5',
                200: '#fed7aa',
                300: '#fdba74',
                400: '#fb923c',
                500: '#f97316',
                600: '#ea580c',
                800: '#9a3412',
                900: '#7c2d12',
              },
              "stone": {
                400: '#a8a29e',
                500: '#78716c',
                600: '#57534e',
                700: '#44403c',
                800: '#292524',
                900: '#1c1917',
              }
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "margin-mobile": "24px",
                    "xs": "4px",
                    "sm": "8px",
                    "xl": "32px",
                    "gutter": "12px",
                    "md": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-lg": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "handwriting": ["'Comic Sans MS'", "cursive", "sans-serif"]
            },
            "fontSize": {
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                    "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                    "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "800" }],
                    "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "700" }],
                    "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }]
            }
          }
        }
      }
    </script>
<style>
        /* Cream-colored, hand-drawn notebook background */
        .paper-grid {
            background-color: theme('colors.orange.50');
            background-image: linear-gradient(theme('colors.orange.200') 2px, transparent 2px);
            background-size: 100% 32px;
            background-position: center top;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="paper-grid min-h-screen text-stone-800 antialiased relative overflow-x-hidden selection:bg-orange-200 selection:text-orange-900 pb-24">
<!-- Decorative whimsical accents in corners -->
<span class="material-symbols-outlined fixed top-12 left-2 text-orange-300 opacity-40 text-[48px] pointer-events-none -rotate-12" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="material-symbols-outlined fixed bottom-24 right-4 text-orange-300 opacity-40 text-[64px] pointer-events-none rotate-12" style="font-variation-settings: 'FILL' 1;">spa</span>
<div class="max-w-md mx-auto w-full relative z-10 flex flex-col min-h-screen pb-xl">
<!-- TopAppBar Component -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-orange-50 dark:bg-stone-900 docked full-width top-0 rounded-b-[2rem] border-b-2 border-dashed border-orange-200 dark:border-stone-700 shadow-[0_4px_0_0_rgba(255,179,142,0.1)] sticky top-0 z-20 backdrop-blur-md bg-opacity-90">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-orange-400 dark:text-orange-200 hover:bg-orange-100/50 dark:hover:bg-stone-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[24px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-2xl font-black text-orange-400 dark:text-orange-200 italic font-plus-jakarta-sans tracking-tight">Entry</h1>
<button class="flex items-center gap-xs px-md py-sm bg-orange-400 text-white rounded-full font-label-lg text-label-lg shadow-[0_4px_0_rgba(251,146,60,0.4)] hover:shadow-[0_6px_0_rgba(251,146,60,0.6)] hover:-translate-y-0.5 active:translate-y-1 active:shadow-none transition-all border-2 border-dashed border-orange-200">
<span class="material-symbols-outlined text-[18px]" data-icon="edit" style="font-variation-settings: 'FILL' 1;">edit</span>
        Edit
    </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile flex flex-col gap-lg mt-md">
<!-- Metadata Area -->
<div class="flex flex-wrap items-center gap-sm">
<div class="px-sm py-xs bg-orange-100 text-orange-800 border-2 border-dashed border-orange-300 rounded-full font-label-sm text-label-sm flex items-center gap-xs shadow-sm">
<span class="material-symbols-outlined text-[14px]" data-icon="calendar_today">calendar_today</span>
                    October 24, 2023
                </div>
<div class="px-sm py-xs bg-rose-100 text-rose-800 border-2 border-dashed border-rose-300 rounded-full font-label-sm text-label-sm flex items-center gap-xs shadow-sm">
<span class="material-symbols-outlined text-[14px]" data-icon="sentiment_very_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
                    Cozy
                </div>
<div class="px-sm py-xs bg-sky-100 text-sky-800 border-2 border-dashed border-sky-300 rounded-full font-label-sm text-label-sm flex items-center gap-xs shadow-sm">
<span class="material-symbols-outlined text-[14px]" data-icon="wb_sunny" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
                    Sunny
                </div>
</div>
<!-- Title -->
<h1 class="font-headline-lg text-headline-lg text-stone-800">A perfect afternoon at the bamboo grove</h1>
<!-- Polaroid Image Area -->
<div class="relative w-full max-w-[320px] mx-auto mt-sm mb-md -rotate-3 hover:rotate-0 transition-transform duration-300 group">
<div class="bg-white p-md pb-xl rounded-2xl shadow-[0_8px_0_rgba(254,215,170,0.5)] border-4 border-dashed border-orange-200 relative">
<!-- Cute Sticker -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-rose-100 rounded-full flex items-center justify-center shadow-[0_4px_0_rgba(254,205,211,1)] rotate-12 z-10 border-2 border-dashed border-rose-300">
<span class="material-symbols-outlined text-rose-500 text-[24px]" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="w-full aspect-square bg-orange-50 rounded-xl overflow-hidden relative border-2 border-orange-100">
<!-- Image -->
<img alt="sunlit clearing in a lush green bamboo forest with soft dreamy lighting and gentle shadows" class="w-full h-full object-cover" data-alt="sunlit clearing in a lush green bamboo forest with soft dreamy lighting and gentle shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUlITrZ4FQ8rTM1WsmnkuEBTmP7ed--Qei-wDW5kIMQjAqqRQIk7zfJYXwf1uESQdAj2_KVYL8wGtOSb8h4RqeFmIV8FOcefRJXoQADILolJalnMdVwYkvt_wFcroJj2PMqxLhpYL-uD3QDWyKabf5GQciEzDZDcJayxKAeGMgfoBzPyGTWKsXpa97jvUTF4-zJboLjmYAYsPyPD9mP4NSe1IKtW1tCG7cQ4WfdOGrADaNEtIROH3hGG7m1EQ3fMmK5y727zVvJK0B"/>
<!-- Overlay Add Button (Visible on hover or empty state) -->
<div class="absolute inset-0 bg-stone-900/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
<button class="w-14 h-14 bg-white/90 rounded-full flex items-center justify-center text-orange-500 shadow-md hover:scale-110 transition-transform border-2 border-dashed border-orange-300">
<span class="material-symbols-outlined text-[28px]" data-icon="add_photo_alternate">add_photo_alternate</span>
</button>
</div>
</div>
<p class="font-label-lg text-lg text-center text-stone-500 mt-sm font-handwriting">So peaceful...</p>
</div>
</div>
<!-- Journal Text Area -->
<div class="relative group mt-4">
<!-- Focus Indicator styling for the text area -->
<div class="absolute inset-0 rounded-2xl bg-white/80 border-2 border-dashed border-orange-200 shadow-[0_4px_0_rgba(254,215,170,0.3)] -z-10 group-focus-within:border-orange-400 group-focus-within:shadow-[0_4px_0_rgba(251,146,60,0.3)] transition-all"></div>
<textarea class="w-full h-64 bg-transparent border-none resize-none p-lg font-body-lg text-body-lg text-stone-700 leading-[32px] focus:ring-0 focus:outline-none placeholder:text-stone-400 font-medium" placeholder="What's on your mind today, little panda?">Today I found the most comfortable spot under the large oak tree near the edge of the bamboo forest. The sunlight was filtering through the leaves just right, creating dancing patterns on the ground.

I brought my favorite green tea and just sat there for hours, listening to the wind rustle through the stalks. It felt like the whole world slowed down just for me. 

Sometimes, doing absolutely nothing is exactly what you need to do.</textarea>
<div class="absolute bottom-4 right-4 opacity-30 pointer-events-none">
<span class="material-symbols-outlined text-4xl text-orange-500" data-icon="cruelty_free" style="font-variation-settings: 'FILL' 1;">cruelty_free</span>
</div>
</div>
</main>
<!-- BottomNavBar Component -->
</div>
</body></html>
